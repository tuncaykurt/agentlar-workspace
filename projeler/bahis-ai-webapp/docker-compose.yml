version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - CORS_ORIGINS=https://bahis-ai.yapayzekaotomasyon.cloud,http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://bahis-ai-api.yapayzekaotomasyon.cloud
    restart: unless-stopped
