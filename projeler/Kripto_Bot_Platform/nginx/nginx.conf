events {
  worker_connections 1024;
}

http {
  # DNS resolver — container isimlerini cozumlemek icin Docker DNS
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;

    # Frontend — variable ile resolve et (nginx baslarken frontend hazir olmak zorunda degil)
    location / {
      set $frontend_upstream http://frontend:3000;
      proxy_pass $frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 10s;
      proxy_read_timeout 60s;
    }

    # TradingView webhook ve tum API istekleri
    location /api/ {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 10s;
      proxy_read_timeout 120s;
    }

    # Signals webhook — path disindaki istekler
    location /signals/ {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 10s;
      proxy_read_timeout 120s;
    }

    # WebSocket
    location /ws/ {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_connect_timeout 10s;
      proxy_read_timeout 86400s;
    }
  }
}
