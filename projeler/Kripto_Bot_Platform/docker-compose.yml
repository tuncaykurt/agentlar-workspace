
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - PORT=3000
      # SSR tarafında Next.js rewrites için backend servis adresi
      - BACKEND_URL=http://backend:8000
      # Tarayıcı (client) tarafı için — boş bırakıldığında /api prefix'ini kullanır
      # (Coolify kendi domain'ini ekler, bu değişken /api yolunu sabitler)
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - kripto-redis
      - kripto-db
    restart: unless-stopped
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1


  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kripto-nginx.rule=PathPrefix(`/`)"
      - "traefik.http.services.kripto-nginx.loadbalancer.server.port=80"


  kripto-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=kriptobots
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  kripto-redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal

  # freqtrade: şimdilik devre dışı — ayrı compose ile çalıştırılacak
