version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Next.js sunucu taraflı proxy için — frontend container'dan backend'e erişim
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - kripto-redis
    restart: unless-stopped
    networks:
      - coolify
      - internal

  kripto-redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal

volumes:
  redis_data:

networks:
  coolify:
    external: true
  internal:
    driver: bridge
