<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Spor Araç Splash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wrap {
      position: relative;
      width: min(800px, 100vw);
      aspect-ratio: 8/5;
    }
    #car-svg, #beam-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #beam-canvas { pointer-events: none; }
  </style>
</head>
<body>
<div id="wrap">

<!-- ─────────── ARAÇ SVG ─────────── -->
<svg id="car-svg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Yumuşak glow filtresi -->
    <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-100%" y="-100%" width="300%" height="300%">

    <!-- Gövde gradyanı -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#22223a"/>
      <stop offset="45%"  stop-color="#161628"/>
      <stop offset="100%" stop-color="#0a0a16"/>

    <!-- Izgara gradyanı -->
    <linearGradient id="grillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d0d1c"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>

    <!-- Far yuvası gradyanı -->
    <linearGradient id="hlHouseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e0e20"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>
  </defs>

  <!-- Arka zemin -->
  <rect width="800" height="500" fill="#000008"/>

  <!-- Zemin çizgisi -->
  <rect x="0" y="455" width="800" height="45" fill="#03030e"/>
  <line x1="0" y1="455" x2="800" y2="455" stroke="#12122a" stroke-width="1.5"/>

  <!-- ════ GÖVDE ANA SİLÜETİ ════ -->
  <path id="car-body"
    d="M 58,442
       Q 58,358 92,285
       Q 113,228 156,200
       Q 198,168 282,156
       L 400,148
       L 518,156

    <!-- DRL şeridi (çoklu segment, sweep animasyonu için) -->
    <line id="ld1" x1="282" y1="256" x2="255" y2="255" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="ld2" x1="254" y1="255" x2="222" y2="254" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>

    <line id="ld4" x1="189" y1="253" x2="158" y2="252" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="ld5" x1="157" y1="252" x2="134" y2="251" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>

    <!-- Üst ince DRL (pozisyon lambası) -->
    <path id="lup" d="M 138,212 L 280,217" stroke="#334" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>

    <!-- Halo (JS ile renklendiriliyor) -->
    <ellipse id="l-halo" cx="192" cy="242" rx="95" ry="58" fill="rgba(0,0,0,0)" filter="url(#glow-lg)"/>

  <!-- ════ SAĞ FAR YUVASI (ayna) ════ -->
  <g id="g-right">
    <path d="M 675,208 L 682,268 L 507,275 L 502,212 L 525,194 Z"
      fill="url(#hlHouseGrad)" stroke="#20203a" stroke-width="1.2"/>

    <path id="rl" d="M 668,220 L 673,262 L 520,268 L 515,224 Z"

    <circle id="rp-ring"  cx="608" cy="242" r="30" fill="#0a0a18" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle id="rp-inner" cx="608" cy="242" r="20" fill="#060610"/>
    <circle id="rp-dot"   cx="608" cy="242" r="5"  fill="#111126"/>

    <line id="rd1" x1="518" y1="256" x2="545" y2="255" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="rd2" x1="546" y1="255" x2="578" y2="254" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="rd3" x1="579" y1="254" x2="610" y2="253" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="rd4" x1="611" y1="253" x2="642" y2="252" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>
    <line id="rd5" x1="643" y1="252" x2="666" y2="251" stroke="#fff" stroke-width="3.5" stroke-linecap="round" opacity="0"/>

    <path id="rup" d="M 662,212 L 520,217" stroke="#334" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>

    <ellipse id="r-halo" cx="608" cy="242" rx="95" ry="58" fill="rgba(0,0,0,0)" filter="url(#glow-lg)"/>
  </g>

  <!-- ════ MERKEZ IZGARA ════ -->
  <g>
    <path d="M 295,280 L 505,280 L 516,402 L 284,402 Z"
      fill="url(#grillGrad)" stroke="#1e1e30" stroke-width="1.8"/>
    <!-- Yatay çubuklar -->
    <line x1="292" y1="300" x2="508" y2="300" stroke="#18182a" stroke-width="1.2"/>
    <line x1="290" y1="320" x2="510" y2="320" stroke="#18182a" stroke-width="1.2"/>
    <line x1="289" y1="340" x2="511" y2="340" stroke="#18182a" stroke-width="1.2"/>
    <line x1="287" y1="360" x2="513" y2="360" stroke="#18182a" stroke-width="1.2"/>
    <line x1="286" y1="380" x2="514" y2="380" stroke="#18182a" stroke-width="1.2"/>
    <!-- Dikey çubuklar -->
    <line x1="322" y1="280" x2="325" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="349" y1="280" x2="352" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="376" y1="280" x2="379" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="403" y1="280" x2="406" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="430" y1="280" x2="433" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="457" y1="280" x2="460" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <line x1="484" y1="280" x2="487" y2="402" stroke="#18182a" stroke-width="1.2"/>
    <!-- Logo yeri -->
    <rect x="368" y="318" width="64" height="42" rx="3"
      fill="#0c0c1a" stroke="#222238" stroke-width="1.2"/>
    <!-- Soyut marka sembolü -->
    <polygon points="400,326 414,348 386,348" fill="none" stroke="#2a2a45" stroke-width="1.5"/>
    <line x1="400" y1="326" x2="400" y2="352" stroke="#2a2a45" stroke-width="1"/>
  </g>

  <!-- ════ SOL HAVA GİRİŞİ ════ -->
  <path d="M 76,295 L 287,295 L 287,400 L 70,393 Z"
    fill="#080812" stroke="#1c1c2e" stroke-width="1.2"/>
  <line x1="78"  y1="316" x2="286" y2="316" stroke="#141424" stroke-width="1.8"/>
  <line x1="76"  y1="337" x2="286" y2="337" stroke="#141424" stroke-width="1.8"/>
  <line x1="74"  y1="358" x2="286" y2="358" stroke="#141424" stroke-width="1.8"/>
  <line x1="72"  y1="379" x2="286" y2="379" stroke="#141424" stroke-width="1.8"/>

  <!-- ════ SAĞ HAVA GİRİŞİ ════ -->
  <path d="M 724,295 L 513,295 L 513,400 L 730,393 Z"
    fill="#080812" stroke="#1c1c2e" stroke-width="1.2"/>
  <line x1="722" y1="316" x2="514" y2="316" stroke="#141424" stroke-width="1.8"/>
  <line x1="724" y1="337" x2="514" y2="337" stroke="#141424" stroke-width="1.8"/>
  <line x1="726" y1="358" x2="514" y2="358" stroke="#141424" stroke-width="1.8"/>
  <line x1="728" y1="379" x2="514" y2="379" stroke="#141424" stroke-width="1.8"/>

  <!-- ════ ÖN TAMPON / ALT BÖLÜM ════ -->
  <path d="M 58,442 L 62,402 L 287,402 L 287,422 L 400,428 L 513,422 L 513,402 L 738,402 L 742,442 Z"
    fill="#0d0d1c" stroke="#181830" stroke-width="1"/>

  <!-- Plaka yeri -->
  <rect x="345" y="406" width="110" height="28" rx="2"
    fill="#0a0a16" stroke="#1c1c2e" stroke-width="1"/>

  <!-- Alt difüzör -->
  <path d="M 88,442 L 712,442 L 722,456 L 78,456 Z"
    fill="#080812" stroke="#131324" stroke-width="1"/>
  <line x1="150" y1="442" x2="148" y2="456" stroke="#0f0f20" stroke-width="1.5"/>
  <line x1="250" y1="442" x2="248" y2="456" stroke="#0f0f20" stroke-width="1.5"/>
  <line x1="350" y1="442" x2="350" y2="456" stroke="#0f0f20" stroke-width="1.5"/>
  <line x1="450" y1="442" x2="452" y2="456" stroke="#0f0f20" stroke-width="1.5"/>
  <line x1="550" y1="442" x2="552" y2="456" stroke="#0f0f20" stroke-width="1.5"/>
  <line x1="650" y1="442" x2="652" y2="456" stroke="#0f0f20" stroke-width="1.5"/>

  <!-- ════ TEKERLEK KARTI İPUÇLARI ════ -->
  <path d="M 58,442 Q 42,385 60,318 L 92,308 Q 78,372 78,442 Z" fill="#0b0b18"/>
  <path d="M 742,442 Q 758,385 740,318 L 708,308 Q 722,372 722,442 Z" fill="#0b0b18"/>

  <!-- ════ YANSIMA (far ışığı gövdeye vuruyor) ════ -->
  <path id="body-amb"
    d="M 58,442 Q 58,358 92,285 Q 113,228 156,200 Q 198,168 282,156 L 400,148 L 518,156 Q 602,168 644,200 Q 687,228 708,285 Q 742,358 742,442 Z"
    fill="rgba(0,0,0,0)" pointer-events="none"/>

</svg>

<!-- ─────────── IŞIK DEMETİ CANVAS ─────────── -->
<canvas id="beam-canvas" width="800" height="500"></canvas>

</div>

<script>
const cvs = document.getElementById('beam-canvas');
const ctx = cvs.getContext('2d');

// ── SVG element referansları ──────────────────────────────────
const $ = id => document.getElementById(id);

const leftDrl  = [$('ld1'), $('ld2'), $('ld3'), $('ld4'), $('ld5')];
const rightDrl = [$('rd1'), $('rd2'), $('rd3'), $('rd4'), $('rd5')];

const lpRing  = $('lp-ring'),  lpInner = $('lp-inner'),  lpDot = $('lp-dot');
const rpRing  = $('rp-ring'),  rpInner = $('rp-inner'),  rpDot = $('rp-dot');
const lHalo   = $('l-halo'),   rHalo   = $('r-halo');
const bodyAmb = $('body-amb');
const lLens   = $('ll'),       rLens   = $('rl');
const lUp     = $('lup'),      rUp     = $('rup');

// ── Animasyon fazları ─────────────────────────────────────────
const PHASES = [
  { name: 'dark',      ms: 700  },   // 0 — karanlık
  { name: 'drl-sweep', ms: 1400 },   // 1 — DRL şerit süpürme (sağdan sola / soldan sağa)
  { name: 'drl-hold',  ms: 700  },   // 2 — DRL sabit
  { name: 'main-on',   ms: 350  },   // 3 — ana farlar açılıyor (burst)
  { name: 'hold-on',   ms: 2600 },   // 4 — tam açık
  { name: 'fade-off',  ms: 700  },   // 5 — sönüyor
  { name: 'dark2',     ms: 450  },   // 6 — kısa karanlık
  { name: 'burst2',    ms: 280  },   // 7 — tekrar açılış
  { name: 'steady',    ms: 1e9  },   // 8 — sabit açık
];

let phase = 0, phaseTime = 0, lastTs = null;

// ── Yardımcı fonksiyonlar ────────────────────────────────────
const clamp  = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp   = (a, b, t)   => a + (b - a) * clamp(t, 0, 1);
const easeOut  = t => 1 - (1 - t) ** 2;
const easeIn   = t => t * t;
const easeOutC = t => 1 - (1 - t) ** 3;  // cubic

// ── Canvas: ışık demeti çizimi ────────────────────────────────
function drawBeams(mainA) {
  ctx.clearRect(0, 0, 800, 500);
  if (mainA <= 0) return;

  // Sol far ışık demeti
  drawBeam(ctx, 192, 242, -260, mainA);
  // Sağ far ışık demeti
  drawBeam(ctx, 608, 242, +260, mainA);

  // Zemin parlaması
  const gGrad = ctx.createLinearGradient(0, 445, 0, 500);
  gGrad.addColorStop(0, `rgba(70,120,255,${mainA * 0.28})`);
  gGrad.addColorStop(1,  'rgba(40,80,200,0)');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, 445, 800, 55);

  // Projektör bloom (sadece tam açıkken)
  if (mainA > 0.3) {
    const ba = (mainA - 0.3) / 0.7;
    drawBloom(ctx, 192, 242, ba);
    drawBloom(ctx, 608, 242, ba);
  }
}

function drawBeam(ctx, ox, oy, spread, alpha) {
  const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, 400);
  grad.addColorStop(0,    `rgba(220,235,255,${alpha * 0.38})`);
  grad.addColorStop(0.12, `rgba(160,200,255,${alpha * 0.20})`);
  grad.addColorStop(0.45, `rgba(100,155,255,${alpha * 0.07})`);
  grad.addColorStop(1,     'rgba(50,90,200,0)');

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ox, oy);
  ctx.lineTo(ox + spread, oy + 500);
  ctx.lineTo(ox - spread * 0.35, oy + 500);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

function drawBloom(ctx, cx, cy, alpha) {
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 50);
  g.addColorStop(0,   `rgba(255,255,255,${alpha * 0.95})`);
  g.addColorStop(0.25,`rgba(210,230,255,${alpha * 0.45})`);
  g.addColorStop(0.7, `rgba(120,170,255,${alpha * 0.10})`);
  g.addColorStop(1,    'rgba(80,130,255,0)');
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

// ── SVG elemanlarını güncelle ─────────────────────────────────
function updateSVG(drlSteps, mainA) {
  // DRL şeritler — her segment ayrı ayrı açılıyor
  for (let i = 0; i < 5; i++) {
    const seg = i / 4;  // 0 → 1
    // Sol: sağdan sola (segment 0 = en sağ = önce açılan)
    const lAlpha = clamp((drlSteps - seg) * 5, 0, 1);
    // Sağ: soldan sağa (aynı mantık, mirror)
    const rAlpha = lAlpha;

    const drlColor = mainA > 0 ? `rgb(${200+Math.floor(mainA*55)},${215+Math.floor(mainA*40)},255)` : '#ffffff';
    leftDrl[i].setAttribute('opacity', lAlpha);
    rightDrl[i].setAttribute('opacity', rAlpha);
    leftDrl[i].setAttribute('stroke', drlColor);
    rightDrl[i].setAttribute('stroke', drlColor);
  }

  // Üst pozisyon lambası
  lUp.setAttribute('opacity', 0.3 + drlSteps * 0.5);
  rUp.setAttribute('opacity', 0.3 + drlSteps * 0.5);

  // Projektör lens iç parlaması
  const pv = Math.floor(mainA * 210);
  const pColor = `rgb(${pv},${pv},${Math.min(255, pv + 35)})`;
  lpInner.setAttribute('fill', mainA > 0 ? pColor : '#060610');
  rpInner.setAttribute('fill', mainA > 0 ? pColor : '#060610');

  // Projektör merkez noktası
  const dv = Math.floor(mainA * 240);
  lpDot.setAttribute('fill', mainA > 0 ? `rgb(${dv},${dv},255)` : '#111126');
  rpDot.setAttribute('fill', mainA > 0 ? `rgb(${dv},${dv},255)` : '#111126');

  // Projektör halka rengi
  const ringStroke = mainA > 0.5 ? `rgba(120,180,255,${(mainA-0.5)*1.5})` : '#1a1a2e';
  lpRing.setAttribute('stroke', ringStroke);
  rpRing.setAttribute('stroke', ringStroke);

  // Lens iç alanı (mavi yansıma)
  const lensA = mainA * 0.35;
  lLens.setAttribute('fill', `rgba(30,70,160,${lensA})`);
  rLens.setAttribute('fill', `rgba(30,70,160,${lensA})`);

  // SVG halo (blur ile yumuşak dış ışık)
  const haloA = mainA * 0.5;
  lHalo.setAttribute('fill', `rgba(100,170,255,${haloA})`);
  rHalo.setAttribute('fill', `rgba(100,170,255,${haloA})`);

  // Gövde ambient yansıması
  bodyAmb.setAttribute('fill', `rgba(50,90,210,${mainA * 0.09})`);
}

// ── Ana animasyon döngüsü ─────────────────────────────────────
function animate(ts) {
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs;
  lastTs = ts;
  phaseTime += dt;

  const p = PHASES[phase];
  const t = clamp(phaseTime / p.ms, 0, 1);

  let drlSteps = 0;
  let mainA    = 0;

  switch (phase) {
    case 0: drlSteps = 0;              mainA = 0;            break;  // dark
    case 1: drlSteps = easeOut(t);     mainA = 0;            break;  // sweep
    case 2: drlSteps = 1;              mainA = 0;            break;  // hold
    case 3: drlSteps = 1;              mainA = easeOutC(t);  break;  // burst
    case 4: drlSteps = 1;              mainA = 1;            break;  // on
    case 5: drlSteps = lerp(1,0,t);   mainA = lerp(1,0,easeIn(t)); break; // off
    case 6: drlSteps = 0;              mainA = 0;            break;  // dark2
    case 7: drlSteps = easeOutC(t);   mainA = easeOutC(t);  break;  // burst2
    case 8: drlSteps = 1;              mainA = 1;            break;  // steady
  }

  drawBeams(mainA);
  updateSVG(drlSteps, mainA);

  if (t >= 1 && phase < PHASES.length - 1) {
    phase++;
    phaseTime = 0;
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
