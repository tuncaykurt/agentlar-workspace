<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background-color: #0f172a;">
    <div style="max-width: 640px; margin: 0 auto; padding: 24px 16px;">

        <!-- Header -->
        <div style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 1px solid #334155; border-radius: 16px; overflow: hidden; margin-bottom: 0;">

            <!-- Top gradient bar -->
            <div style="height: 4px; background: linear-gradient(90deg, #22c55e, #3b82f6, #a855f7);"></div>

            <!-- Title -->
            <div style="padding: 28px 24px 20px;">
                <h1 style="margin: 0; font-size: 22px; font-weight: 700; color: #f1f5f9;">
                    &#129657; Antigravity Self-Heal Raporu
                </h1>
                <p style="margin: 8px 0 0; font-size: 14px; color: #94a3b8;">
                    {{TIMESTAMP}} &mdash; {{TOTAL_PROBLEMS}} sorun i&ccedil;in otomatik iyile&#351;tirme denendi
                </p>
            </div>

            <!-- Stats bar -->
            <div style="display: flex; padding: 0 24px 20px; gap: 16px;">
                <div style="flex: 1; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 10px; padding: 12px 16px; text-align: center;">
                    <div style="font-size: 24px; font-weight: 700; color: #22c55e;">{{HEALED_COUNT}}</div>
                    <div style="font-size: 11px; color: #86efac; text-transform: uppercase; letter-spacing: 0.5px;">D&uuml;zeltildi</div>
                </div>
                <div style="flex: 1; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; padding: 12px 16px; text-align: center;">
                    <div style="font-size: 24px; font-weight: 700; color: #ef4444;">{{FAILED_COUNT}}</div>
                    <div style="font-size: 11px; color: #fca5a5; text-transform: uppercase; letter-spacing: 0.5px;">M&uuml;dahale Gerekli</div>
                </div>
                <div style="flex: 1; background: rgba(148, 163, 184, 0.1); border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 10px; padding: 12px 16px; text-align: center;">
                    <div style="font-size: 24px; font-weight: 700; color: #94a3b8;">{{SKIPPED_COUNT}}</div>
                    <div style="font-size: 11px; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.5px;">Ge&ccedil;ici / Bekleme</div>
                </div>
            </div>

            <!-- Healed Section -->
            {{HEALED_SECTION}}

            <!-- Failed Section -->
            {{FAILED_SECTION}}

            <!-- Footer -->
            <div style="padding: 20px 24px; border-top: 1px solid #1e293b; text-align: center;">
                <p style="margin: 0; font-size: 12px; color: #475569;">
                    Antigravity Self-Healer v1 &mdash;
                    <a href="https://railway.app/dashboard" style="color: #3b82f6; text-decoration: none;">Railway Dashboard &#8594;</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
